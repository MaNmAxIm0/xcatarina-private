name: Sync GitLab mirror

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push mirror to GitLab
        env:
          GITLAB_REPOSITORY_URL: ${{ secrets.GITLAB_REPOSITORY_URL }}
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${GITLAB_REPOSITORY_URL}" || -z "${GITLAB_TOKEN}" ]]; then
            echo "Configure GITLAB_REPOSITORY_URL and GITLAB_TOKEN repository secrets first."
            exit 1
          fi
          mirror_url="${GITLAB_REPOSITORY_URL#https://}"
          git remote add gitlab "https://oauth2:${GITLAB_TOKEN}@${mirror_url}"
          # Sync only the public branch and tags; do not publish GitHub's
          # internal origin/* tracking refs into GitLab.
          git push --force gitlab HEAD:main
          git push --force --tags gitlab
